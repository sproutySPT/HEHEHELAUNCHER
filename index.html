<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="true" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#070816" />
  <title>Liquid Glass Launcher</title>
  <style>
    :root {
      --bg: #070816;
      --panel: rgba(12, 15, 30, 0.82);
      --line: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.98);
      --text-muted: rgba(255, 255, 255, 0.70);
      --text-muted2: rgba(255, 255, 255, 0.48);
      --shadow: 0 28px 100px rgba(0, 0, 0, 0.34);
      --shadow-sm: 0 8px 32px rgba(0, 0, 0, 0.20);
      --radius: 34px;
      --radius-lg: 28px;
      --radius-md: 18px;
      --blur-lg: blur(14px);
      --blur-md: blur(10px);
      --transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(99, 102, 241, 0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.22), transparent 24%),
        radial-gradient(circle at 50% 92%, rgba(236, 72, 153, 0.17), transparent 28%),
        var(--bg);
      background-attachment: fixed;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-touch-callout: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.26;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 54px 54px;
      z-index: 0;
    }

    button, input, textarea, select {
      font: inherit;
    }

    /* ===== Views ===== */
    .view {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .view.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== Home View ===== */
    .home {
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .home-content {
      max-width: 380px;
      text-align: center;
      animation: slideUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-large {
      margin-bottom: 32px;
    }

    .brand-large small {
      display: block;
      font-size: 12px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--text-muted2);
      margin-bottom: 8px;
    }

    .brand-large h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.1;
      font-weight: 900;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(200, 200, 255, 0.80));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-desc {
      margin: 0 0 48px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .library-btn {
      position: relative;
      width: 100%;
      max-width: 300px;
      aspect-ratio: 1.4;
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text);
      transition: all var(--transition);
      overflow: hidden;
      touch-action: manipulation;
      margin: 0 auto;
    }

    .library-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(88, 44, 131, 0.15),
        rgba(108, 40, 168, 0.4),
        rgba(126, 34, 206, 0.4),
        rgba(108, 40, 168, 0.4),
        rgba(88, 44, 131, 0.15)
      );
      background-size: 200% 100%;
      animation: wavyGradient 3s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes wavyGradient {
      0% {
        background-position: 0% 0%;
      }
      50% {
        background-position: 100% 0%;
      }
      100% {
        background-position: 0% 0%;
      }
    }

    .library-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(88, 44, 131, 0.4), rgba(108, 40, 168, 0.3), rgba(126, 34, 206, 0.2));
      border: 1px solid rgba(126, 34, 206, 0.5);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 60px rgba(88, 44, 131, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      z-index: 1;
      pointer-events: none;
      backdrop-filter: var(--blur-md);
    }

    .library-btn-icon,
    .library-btn-text,
    .library-btn-sub {
      position: relative;
      z-index: 2;
    }

    .library-btn:hover {
      transform: translateY(-4px);
      border-color: rgba(126, 34, 206, 0.8);
      box-shadow: 0 28px 80px rgba(88, 44, 131, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .library-btn:hover::before {
      box-shadow: 0 28px 80px rgba(88, 44, 131, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .library-btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    .library-btn-icon {
      position: relative;
      font-size: 48px;
      line-height: 1;
    }

    .library-btn-text {
      position: relative;
      font-size: 16px;
      font-weight: 750;
      letter-spacing: 0.02em;
    }

    .library-btn-sub {
      position: relative;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .home-shortcuts {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      text-align: left;
    }

    .shortcut-column {
      padding: 10px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04));
      backdrop-filter: var(--blur-md);
      box-shadow: var(--shadow-sm);
    }

    .shortcut-title {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .shortcut-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .quick-app-btn {
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: var(--text);
      border-radius: 16px;
      padding: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 10px;
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
      touch-action: manipulation;
    }

    .quick-app-btn.recent {
      background: linear-gradient(135deg, rgba(236, 72, 153, 0.35), rgba(244, 114, 182, 0.25));
      border-color: rgba(236, 72, 153, 0.5);
      backdrop-filter: var(--blur-md);
      box-shadow: 0 12px 32px rgba(236, 72, 153, 0.18);
    }

    .quick-app-btn.favorite {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.35), rgba(56, 189, 248, 0.25));
      border-color: rgba(34, 211, 238, 0.5);
      backdrop-filter: var(--blur-md);
      box-shadow: 0 12px 32px rgba(34, 211, 238, 0.18);
    }

    .quick-app-btn:hover {
      transform: translateY(-2px);
    }

    .quick-app-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .quick-app-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 20px;
      line-height: 1;
    }

    .quick-app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .quick-app-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .quick-app-name {
      font-size: 13px;
      font-weight: 650;
      color: var(--text);
      word-break: break-word;
      line-height: 1.2;
    }

    .quick-app-desc {
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-word;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .shortcut-empty {
      margin: 12px 0 0;
      padding: 0;
      font-size: 12px;
      color: var(--text-muted2);
      text-align: center;
    }

    /* ===== Library View ===== */
    .library {
      flex: 1;
      padding-bottom: 16px;
    }

    .library-header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 16px 16px 12px;
      background:
        radial-gradient(circle at 18% 20%, rgba(99, 102, 241, 0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.22), transparent 24%),
        radial-gradient(circle at 50% 92%, rgba(236, 72, 153, 0.17), transparent 28%),
        var(--bg);
      background-attachment: fixed;
    }

    .library-header::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line) 20%, var(--line) 80%, transparent);
    }

    .lib-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .lib-back-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lib-title h2 {
      margin: 0;
      flex: 1;
      font-size: 24px;
      font-weight: 900;
      text-align: center;
    }

    .lib-add-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition);
    }

    .lib-add-btn:hover {
      transform: scale(1.08);
    }

    .lib-add-btn:active {
      transform: scale(0.96);
    }

    .lib-search {
      position: relative;
    }

    .lib-search input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 14px;
      backdrop-filter: var(--blur-md);
      transition: border-color var(--transition), background var(--transition);
    }

    .lib-search input::placeholder {
      color: var(--text-muted2);
    }

    .lib-search input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.12);
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 12px 16px;
      overflow-y: auto;
      flex: 1;
    }

    @media (min-width: 480px) {
      .apps-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      }
    }

    .app-card {
      position: relative;
      border-radius: 20px;
      padding: 12px;
      border: 1px solid rgba(168, 85, 247, 0.4);
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.25), rgba(139, 92, 246, 0.18), rgba(99, 102, 241, 0.12));
      backdrop-filter: var(--blur-md);
      box-shadow: 
        0 20px 50px rgba(168, 85, 247, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
      cursor: grab;
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 12px;
      align-items: flex-start;
      transition: all var(--transition);
      touch-action: manipulation;
      overflow: hidden;
      user-select: none;
    }

    .app-card:active {
      cursor: grabbing;
    }

    .app-card.dragging {
      opacity: 0.5;
      transform: scale(0.95);
      border-color: rgba(168, 85, 247, 0.8);
      box-shadow: 
        0 28px 70px rgba(168, 85, 247, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .app-card.drag-over {
      border-color: rgba(168, 85, 247, 0.8);
      border-style: dashed;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.35), rgba(139, 92, 246, 0.25), rgba(99, 102, 241, 0.18));
    }

    .app-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.1), transparent 40%);
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }

    .app-card:hover {
      transform: translateY(-3px);
      border-color: rgba(168, 85, 247, 0.6);
      box-shadow: 
        0 28px 70px rgba(168, 85, 247, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .app-card:hover::before {
      opacity: 1;
    }

    .app-card:active {
      transform: translateY(-1px) scale(0.98);
    }

    .app-card-menu {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 5;
    }

    .app-card:hover .app-card-menu {
      opacity: 1;
    }

    .app-card-btn {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      width: 28px;
      height: 28px;
      padding: 4px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .app-card-btn svg {
      width: 14px;
      height: 14px;
    }

    .app-card-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
    }

    .app-card-btn.delete:hover {
      background: rgba(239, 68, 68, 0.3);
      border-color: rgba(239, 68, 68, 0.5);
      color: rgba(239, 68, 68, 1);
    }

    .app-card-btn.favorite.active {
      background: rgba(251, 146, 60, 0.3);
      border-color: rgba(251, 146, 60, 0.5);
      color: rgba(251, 146, 60, 1);
    }

    .app-card-icon {
      position: relative;
      z-index: 2;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      line-height: 1;
      flex-shrink: 0;
      overflow: hidden;
    }

    .app-card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-card-content {
      position: relative;
      z-index: 2;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .app-card-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      word-break: break-word;
      line-height: 1.2;
    }

    .app-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-word;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .app-card-date {
      font-size: 11px;
      color: var(--text-muted2);
      line-height: 1.2;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
    }

    .empty-badge {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .empty-state h4 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .empty-state p {
      margin: 0;
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ===== Modal ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      background: rgba(0, 0, 0, 0);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 16px;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.48);
    }

    .modal-panel {
      position: relative;
      background:
        radial-gradient(circle at 18% 20%, rgba(99, 102, 241, 0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.22), transparent 24%),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur-lg);
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin: 0 auto;
    }

    .modal-header {
      position: relative;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      flex: 1;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .form-input {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 14px;
      transition: border-color var(--transition), background var(--transition);
    }

    .form-input::placeholder {
      color: var(--text-muted2);
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(168, 85, 247, 0.6);
      background: rgba(255, 255, 255, 0.12);
    }

    textarea.form-input {
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .icon-preview {
      display: none;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
      margin-top: 8px;
    }

    .icon-preview.show {
      display: flex;
    }

    .icon-preview-img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .icon-preview-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .icon-preview-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .file-input-wrapper {
      position: relative;
      display: block;
      border-radius: var(--radius-md);
    }

    .file-input-label {
      display: block;
      padding: 16px 14px;
      border: 2px dashed rgba(126, 34, 206, 0.4);
      border-radius: var(--radius-md);
      background: rgba(126, 34, 206, 0.08);
      color: var(--text-muted);
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
    }

    .file-input-label:hover {
      border-color: rgba(126, 34, 206, 0.6);
      background: rgba(126, 34, 206, 0.14);
      color: var(--text);
    }

    .file-input-wrapper input[type="file"] {
      display: none;
    }

    .error-msg {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: rgba(255, 200, 200, 1);
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .modal-footer {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      touch-action: manipulation;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(139, 92, 246, 0.7));
      color: var(--text);
      border: 1px solid rgba(168, 85, 247, 0.6);
      box-shadow: 0 12px 32px rgba(168, 85, 247, 0.2);
      flex: 1;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 48px rgba(168, 85, 247, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .btn-secondary:active {
      transform: scale(0.98);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-inline {
      background: none;
      border: none;
      color: var(--text-muted);
      text-decoration: underline;
      padding: 0;
      font-size: 12px;
    }

    .btn-inline:hover {
      color: var(--text);
    }

    /* ===== Runtime View ===== */
    .runtime {
      flex-direction: column;
    }

    .runtime-header {
      position: relative;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .runtime-title {
      margin: 0;
      flex: 1;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }

    .runtime-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .runtime-content {
      flex: 1;
      overflow: hidden;
    }

    .runtime-iframe {
      border: none;
      width: 100%;
      height: 100%;
    }

    @media (max-height: 600px) {
      .modal-panel {
        max-height: 100vh;
        border-radius: 28px 28px 0 0;
      }
    }
  </style>
</head>
<body>
  <!-- Home View -->
  <div class="view home active" id="homeView">
    <div class="home-content">
      <div class="brand-large">
        <small>APP LAUNCHER</small>
        <h1>Launcher VIBE</h1>
      </div>
      <p class="brand-desc">나만의 앱을 만들고 정리하는 공간</p>
      <button class="library-btn" id="toLibraryBtn">
        <span class="library-btn-icon">📚</span>
        <span class="library-btn-text">라이브러리 열기</span>
        <span class="library-btn-sub">내 앱 관리하기</span>
      </button>
      <div class="home-shortcuts">
        <div class="shortcut-column">
          <p class="shortcut-title">최근 실행</p>
          <div class="shortcut-list" id="recentAppsList"></div>
        </div>
        <div class="shortcut-column">
          <p class="shortcut-title">즐겨찾기</p>
          <div class="shortcut-list" id="favoriteAppsList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Library View -->
  <div class="view library" id="libraryView">
    <header class="library-header">
      <div class="lib-title">
        <button class="lib-back-btn" id="libraryBackBtn" title="돌아가기">←</button>
        <h2>라이브러리</h2>
        <button class="lib-add-btn" id="libraryAddBtn" title="앱 추가">＋</button>
      </div>
      <div class="lib-search">
        <input type="text" id="librarySearchInput" placeholder="앱 검색..." />
      </div>
    </header>
    <div class="apps-grid" id="appsGrid"></div>
  </div>

  <!-- Runtime View -->
  <div class="view runtime" id="runtimeView">
    <header class="runtime-header">
      <h2 class="runtime-title" id="runtimeTitle">앱</h2>
      <button class="runtime-close" id="runtimeCloseBtn" title="닫기">✕</button>
    </header>
    <div class="runtime-content">
      <iframe class="runtime-iframe" id="runtimeFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"></iframe>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal-panel">
      <header class="modal-header">
        <h3 id="modalTitle">새 앱 추가</h3>
        <button class="modal-close" id="closeModalBtn" type="button" title="닫기">✕</button>
      </header>
      <div class="modal-content">
        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
          <label class="form-label">앱 이름</label>
          <input type="text" id="nameInput" class="form-input" placeholder="예: 내 할일" maxlength="50" />
        </div>

        <div class="form-group">
          <label class="form-label">설명</label>
          <textarea id="descInput" class="form-input" placeholder="앱에 대한 간단한 설명..." maxlength="200"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">출시 날짜</label>
          <input type="date" id="dateInput" class="form-input" />
        </div>

        <div class="form-group">
          <label class="form-label">아이콘 이미지</label>
          <div class="file-input-wrapper">
            <label class="file-input-label">
              파일 선택 또는 드래그
              <input type="file" id="iconInput" accept="image/*" />
            </label>
          </div>
          <div class="icon-preview" id="iconPreview">
            <div class="icon-preview-img" id="iconPreviewImg"></div>
            <div class="icon-preview-text" id="iconPreviewName"></div>
            <button class="btn-inline" id="iconRemoveBtn" type="button">제거</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">HTML 앱 파일</label>
          <div class="file-input-wrapper">
            <label class="file-input-label">
              HTML 파일 선택
              <input type="file" id="htmlInput" accept=".html,.htm" />
            </label>
          </div>
          <div class="icon-preview" id="htmlPreview">
            <div class="icon-preview-text" id="htmlPreviewName"></div>
            <button class="btn-inline" id="htmlRemoveBtn" type="button">제거</button>
          </div>
        </div>
      </div>
      <footer class="modal-footer">
        <button class="btn btn-secondary" id="cancelBtn" type="button">취소</button>
        <button class="btn btn-primary" id="saveBtn" type="button">저장</button>
      </footer>
    </div>
  </div>

  <script>
    (() => {
      // State
      const state = {
        currentView: 'home',
        apps: [],
        searchQuery: '',
        editingId: null,
        formData: {
          name: '',
          description: '',
          date: '',
          iconImage: '',
          htmlContent: '',
        },
      };

      // DOM Elements
      const els = {
        // Views
        homeView: document.getElementById('homeView'),
        libraryView: document.getElementById('libraryView'),
        runtimeView: document.getElementById('runtimeView'),

        // Home
        toLibraryBtn: document.getElementById('toLibraryBtn'),
        recentAppsList: document.getElementById('recentAppsList'),
        favoriteAppsList: document.getElementById('favoriteAppsList'),

        // Library
        libraryBackBtn: document.getElementById('libraryBackBtn'),
        libraryAddBtn: document.getElementById('libraryAddBtn'),
        librarySearchInput: document.getElementById('librarySearchInput'),
        appsGrid: document.getElementById('appsGrid'),

        // Runtime
        runtimeView: document.getElementById('runtimeView'),
        runtimeTitle: document.getElementById('runtimeTitle'),
        runtimeCloseBtn: document.getElementById('runtimeCloseBtn'),
        runtimeFrame: document.getElementById('runtimeFrame'),

        // Modal
        modalBackdrop: document.getElementById('modalBackdrop'),
        modalTitle: document.getElementById('modalTitle'),
        closeModalBtn: document.getElementById('closeModalBtn'),
        nameInput: document.getElementById('nameInput'),
        descInput: document.getElementById('descInput'),
        dateInput: document.getElementById('dateInput'),
        iconInput: document.getElementById('iconInput'),
        iconPreview: document.getElementById('iconPreview'),
        iconPreviewImg: document.getElementById('iconPreviewImg'),
        iconPreviewName: document.getElementById('iconPreviewName'),
        iconRemoveBtn: document.getElementById('iconRemoveBtn'),
        htmlInput: document.getElementById('htmlInput'),
        htmlPreview: document.getElementById('htmlPreview'),
        htmlPreviewName: document.getElementById('htmlPreviewName'),
        htmlRemoveBtn: document.getElementById('htmlRemoveBtn'),
        errorMsg: document.getElementById('errorMsg'),
        cancelBtn: document.getElementById('cancelBtn'),
        saveBtn: document.getElementById('saveBtn'),
      };

      // Storage
      const STORAGE_KEY = 'appLibraryData';

      const loadApps = () => {
        try {
          const data = localStorage.getItem(STORAGE_KEY);
          return data ? JSON.parse(data) : [];
        } catch {
          return [];
        }
      };

      const saveApps = () => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.apps));
      };

      // View Management
      const showView = (viewName) => {
        state.currentView = viewName;
        els.homeView.classList.remove('active');
        els.libraryView.classList.remove('active');
        els.runtimeView.classList.remove('active');

        if (viewName === 'home') {
          els.homeView.classList.add('active');
        } else if (viewName === 'library') {
          els.libraryView.classList.add('active');
          renderLibrary();
        } else if (viewName === 'runtime') {
          els.runtimeView.classList.add('active');
        }
      };

      // Modal Management
      const openAddModal = () => {
        state.editingId = null;
        state.formData = {
          name: '',
          description: '',
          date: '',
          iconImage: '',
          htmlContent: '',
        };

        els.modalTitle.textContent = '새 앱 추가';
        els.nameInput.value = '';
        els.descInput.value = '';
        els.dateInput.value = '';
        els.iconInput.value = '';
        els.htmlInput.value = '';
        els.iconPreview.style.display = 'none';
        els.htmlPreview.style.display = 'none';
        setError('');

        els.modalBackdrop.classList.add('open');
        els.nameInput.focus();
      };

      const openEditModal = (appId) => {
        const app = state.apps.find(a => a.id === appId);
        if (!app) return;

        state.editingId = appId;
        state.formData = {
          name: app.name || '',
          description: app.description || '',
          date: app.date || '',
          iconImage: app.iconImage || '',
          htmlContent: app.htmlContent || '',
        };

        els.modalTitle.textContent = '앱 수정';
        els.nameInput.value = state.formData.name;
        els.descInput.value = state.formData.description;
        els.dateInput.value = state.formData.date;
        els.iconInput.value = '';
        els.htmlInput.value = '';

        if (state.formData.iconImage) {
          els.iconPreviewImg.innerHTML = `<img src="${state.formData.iconImage}" alt="" />`;
          els.iconPreviewName.textContent = '아이콘 설정됨';
          els.iconPreview.style.display = 'flex';
        } else {
          els.iconPreview.style.display = 'none';
        }

        if (state.formData.htmlContent) {
          els.htmlPreviewName.textContent = 'HTML 파일 설정됨';
          els.htmlPreview.style.display = 'flex';
        } else {
          els.htmlPreview.style.display = 'none';
        }

        setError('');
        els.modalBackdrop.classList.add('open');
        els.nameInput.focus();
      };

      const hideModal = () => {
        els.modalBackdrop.classList.remove('open');
      };

      const setError = (msg) => {
        if (msg) {
          els.errorMsg.textContent = msg;
          els.errorMsg.classList.add('show');
        } else {
          els.errorMsg.classList.remove('show');
        }
      };

      // App Management
      const saveApp = () => {
        const name = els.nameInput.value.trim();
        const desc = els.descInput.value.trim();
        const date = els.dateInput.value.trim();

        if (!name) {
          setError('앱 이름을 입력해.');
          return;
        }

        if (!state.formData.htmlContent) {
          setError('HTML 파일을 업로드해.');
          return;
        }

        const now = Date.now();

        if (state.editingId) {
          const app = state.apps.find(a => a.id === state.editingId);
          if (app) {
            app.name = name;
            app.description = desc;
            app.date = date;
            if (state.formData.iconImage) app.iconImage = state.formData.iconImage;
            if (state.formData.htmlContent) app.htmlContent = state.formData.htmlContent;
            app.timestamp = now;
          }
        } else {
          state.apps.push({
            id: 'app-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9),
            name,
            description: desc,
            date,
            iconImage: state.formData.iconImage || '',
            htmlContent: state.formData.htmlContent,
            favorite: false,
            lastOpened: 0,
            timestamp: now,
          });
        }

        saveApps();
        renderLibrary();
        renderHomeShortcuts();
        hideModal();
      };

      const deleteApp = (appId) => {
        if (confirm('이 앱을 삭제할까?')) {
          state.apps = state.apps.filter(a => a.id !== appId);
          saveApps();
          renderLibrary();
          renderHomeShortcuts();
        }
      };

      const launchApp = (appId) => {
        const app = state.apps.find(a => a.id === appId);
        if (!app || !app.htmlContent) return;

        app.lastOpened = Date.now();
        saveApps();

        els.runtimeTitle.textContent = app.name || '앱';
        els.runtimeFrame.srcdoc = app.htmlContent;
        showView('runtime');
      };

      // Utilities
      const escapeHtml = (str) => {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      };

      const normalizeHtmlText = (text) => {
        // 텍스트 그대로 반환
        return text;
      };

      const readFileAsDataURL = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const result = reader.result;
              // 이미지 파일은 Data URL로 반환
              if (file.type.startsWith('image/')) {
                resolve(result);
              }
              // HTML/텍스트 파일은 정규화된 텍스트로 반환
              else if (file.type.startsWith('text/') || file.name.endsWith('.html') || file.name.endsWith('.htm')) {
                resolve(normalizeHtmlText(String(result || '')));
              }
              else {
                resolve(String(result || ''));
              }
            } catch (err) {
              reject(err);
            }
          };
          reader.onerror = () => reject(new Error('File read error'));
          // 이미지 파일은 DataURL로, HTML/텍스트는 텍스트로 읽기
          if (file.type.startsWith('image/')) {
            reader.readAsDataURL(file);
          } else {
            reader.readAsText(file);
          }
        });
      };

      // Render Functions
      const renderHomeShortcuts = () => {
        const recentApps = [...state.apps]
          .filter(app => Number(app.lastOpened || 0) > 0)
          .sort((a, b) => Number(b.lastOpened || 0) - Number(a.lastOpened || 0))
          .slice(0, 3);

        const favoriteApps = [...state.apps]
          .filter(app => Boolean(app.favorite))
          .sort((a, b) => Number(b.timestamp || 0) - Number(a.timestamp || 0))
          .slice(0, 3);

        const renderList = (apps, emptyText, className) => {
          if (!apps.length) {
            return `<p class="shortcut-empty">${emptyText}</p>`;
          }

          return apps.map(app => `
            <button class="quick-app-btn ${className}" type="button" data-quick-launch="${app.id}" title="${escapeHtml(app.name)} 실행">
              <span class="quick-app-icon">${app.iconImage ? `<img src="${app.iconImage}" alt="" />` : '📦'}</span>
              <div class="quick-app-content">
                <span class="quick-app-name">${escapeHtml(app.name)}</span>
                <span class="quick-app-desc">${escapeHtml(app.description || '설명 없음')}</span>
              </div>
            </button>
          `).join('');
        };

        els.recentAppsList.innerHTML = renderList(recentApps, '실행한 앱이 아직 없어요', 'recent');
        els.favoriteAppsList.innerHTML = renderList(favoriteApps, '즐겨찾기 앱이 없어요', 'favorite');
      };

      const toggleFavorite = (appId) => {
        const app = state.apps.find(a => a.id === appId);
        if (!app) return;
        app.favorite = !app.favorite;
        saveApps();
        renderLibrary();
        renderHomeShortcuts();
      };

      const formatDate = (dateStr) => {
        if (!dateStr) return '출시일 미정';
        try {
          const date = new Date(dateStr + 'T00:00:00');
          return date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch {
          return dateStr;
        }
      };

      let draggedElement = null;
      let draggedId = null;

      const enableDragAndDrop = () => {
        const cards = els.appsGrid.querySelectorAll('[data-id]');

        cards.forEach(card => {
          card.draggable = true;

          card.addEventListener('dragstart', (e) => {
            if (e.target.closest('button')) {
              e.preventDefault();
              return;
            }
            draggedElement = card;
            draggedId = card.getAttribute('data-id');
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', card.innerHTML);
          });

          card.addEventListener('dragend', (e) => {
            draggedElement = null;
            draggedId = null;
            card.classList.remove('dragging');
            cards.forEach(c => c.classList.remove('drag-over'));
          });

          card.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (card === draggedElement) return;
            e.dataTransfer.dropEffect = 'move';
            card.classList.add('drag-over');
          });

          card.addEventListener('dragleave', (e) => {
            card.classList.remove('drag-over');
          });

          card.addEventListener('drop', (e) => {
            e.preventDefault();
            if (!draggedId || draggedId === card.getAttribute('data-id')) return;

            const draggedIndex = state.apps.findIndex(a => a.id === draggedId);
            const targetIndex = state.apps.findIndex(a => a.id === card.getAttribute('data-id'));

            if (draggedIndex !== -1 && targetIndex !== -1) {
              const [draggedApp] = state.apps.splice(draggedIndex, 1);
              state.apps.splice(targetIndex, 0, draggedApp);
              saveApps();
              renderLibrary();
            }

            card.classList.remove('drag-over');
          });
        });
      };

      const renderLibrary = () => {
        const query = state.searchQuery.trim().toLowerCase();
        const filtered = query
          ? state.apps.filter(app =>
              (app.name + ' ' + (app.description || '')).toLowerCase().includes(query)
            )
          : state.apps;

        if (!filtered.length) {
          els.appsGrid.innerHTML = `
            <div style="grid-column: 1 / -1;">
              <div class="empty-state">
                <div>
                  <div class="empty-badge">${state.apps.length ? '🔍' : '📦'}</div>
                  <h4>${state.apps.length ? '검색 결과가 없어요' : '아직 앱이 없어요'}</h4>
                  <p>${state.apps.length ? '검색어를 바꿔봐.' : '오른쪽 위 ＋ 버튼으로 첫 앱을 만들어봐.'}</p>
                </div>
              </div>
            </div>
          `;
          return;
        }

        els.appsGrid.innerHTML = filtered.map(app => `
          <article class="app-card" data-id="${app.id}">
            <div class="app-card-menu">
              <button class="app-card-btn favorite ${app.favorite ? 'active' : ''}" type="button" data-favorite="${app.id}" title="즐겨찾기">
                <svg viewBox="0 0 24 24"><path d="M12 17.2l-5.56 3.27 1.48-6.2L3 10.24l6.36-.53L12 4l2.64 5.71 6.36.53-4.92 4.03 1.48 6.2z" fill="currentColor"/></svg>
              </button>
              <button class="app-card-btn" type="button" data-edit="${app.id}" title="수정">
                <svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16z" fill="currentColor"/><path d="M13 6l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
              <button class="app-card-btn delete" type="button" data-delete="${app.id}" title="삭제">
                <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14M10 10v6M14 10v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
            </div>
            <div class="app-card-icon">
              ${app.iconImage ? `<img src="${app.iconImage}" alt="" />` : '📦'}
            </div>
            <div class="app-card-content">
              <div class="app-card-name">${escapeHtml(app.name)}</div>
              <div class="app-card-desc">${escapeHtml(app.description || '설명 없음')}</div>
              <div class="app-card-date">${formatDate(app.date)}</div>
            </div>
          </article>
        `).join('');

        // Event delegation
        els.appsGrid.querySelectorAll('[data-id]').forEach(card => {
          card.addEventListener('click', (e) => {
            if (e.target.closest('[data-edit]') || e.target.closest('[data-delete]') || e.target.closest('[data-favorite]')) return;
            launchApp(card.getAttribute('data-id'));
          });
        });

        els.appsGrid.querySelectorAll('[data-edit]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            openEditModal(btn.getAttribute('data-edit'));
          });
        });

        els.appsGrid.querySelectorAll('[data-delete]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteApp(btn.getAttribute('data-delete'));
          });
        });

        els.appsGrid.querySelectorAll('[data-favorite]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFavorite(btn.getAttribute('data-favorite'));
          });
        });

        // Enable drag and drop
        enableDragAndDrop();
      };

      // Event Listeners
      const attachEvents = () => {
        // Navigation
        els.toLibraryBtn.addEventListener('click', () => showView('library'));
        els.libraryBackBtn.addEventListener('click', () => showView('home'));
        els.runtimeCloseBtn.addEventListener('click', () => showView('library'));

        // Library
        els.libraryAddBtn.addEventListener('click', openAddModal);
        els.librarySearchInput.addEventListener('input', (e) => {
          state.searchQuery = e.target.value || '';
          renderLibrary();
        });

        [els.recentAppsList, els.favoriteAppsList].forEach((container) => {
          container.addEventListener('click', (e) => {
            const button = e.target.closest('[data-quick-launch]');
            if (!button) return;
            launchApp(button.getAttribute('data-quick-launch'));
          });
        });

        // Modal
        els.closeModalBtn.addEventListener('click', hideModal);
        els.cancelBtn.addEventListener('click', hideModal);
        els.saveBtn.addEventListener('click', saveApp);

        els.modalBackdrop.addEventListener('click', (e) => {
          if (e.target === els.modalBackdrop) hideModal();
        });

        els.nameInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            els.descInput.focus();
          }
        });

        // Icon file input
        els.iconInput.addEventListener('change', () => {
          const file = els.iconInput.files?.[0];
          if (!file) return;

          if (!file.type.startsWith('image/')) {
            setError('이미지 파일만 업로드할 수 있어.');
            els.iconInput.value = '';
            return;
          }

          if (file.size > 2 * 1024 * 1024) {
            setError('이미지는 2MB 이하여야 해.');
            els.iconInput.value = '';
            return;
          }

          readFileAsDataURL(file).then(data => {
            state.formData.iconImage = data;
            els.iconPreviewImg.innerHTML = `<img src="${data}" alt="" />`;
            els.iconPreviewName.textContent = file.name;
            els.iconPreview.style.display = 'flex';
            setError('');
          }).catch(() => {
            setError('이미지를 읽는 중 오류가 발생했어.');
            els.iconInput.value = '';
          });
        });

        els.iconRemoveBtn.addEventListener('click', (e) => {
          e.preventDefault();
          state.formData.iconImage = '';
          els.iconInput.value = '';
          els.iconPreview.style.display = 'none';
        });

        // HTML file input
        els.htmlInput.addEventListener('change', () => {
          const file = els.htmlInput.files?.[0];
          if (!file) return;

          if (!file.name.endsWith('.html') && !file.name.endsWith('.htm')) {
            setError('HTML 파일만 업로드할 수 있어.');
            els.htmlInput.value = '';
            return;
          }

          if (file.size > 5 * 1024 * 1024) {
            setError('HTML 파일은 5MB 이하여야 해.');
            els.htmlInput.value = '';
            return;
          }

          readFileAsDataURL(file).then(data => {
            state.formData.htmlContent = data;
            els.htmlPreviewName.textContent = file.name;
            els.htmlPreview.style.display = 'flex';
            setError('');
          }).catch(() => {
            setError('HTML 파일을 읽는 중 오류가 발생했어.');
            els.htmlInput.value = '';
          });
        });

        els.htmlRemoveBtn.addEventListener('click', (e) => {
          e.preventDefault();
          state.formData.htmlContent = '';
          els.htmlInput.value = '';
          els.htmlPreview.style.display = 'none';
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            if (els.modalBackdrop.classList.contains('open')) {
              hideModal();
            } else if (state.currentView === 'runtime') {
              showView('library');
            } else if (state.currentView === 'library') {
              showView('home');
            }
          }
        });
      };

      // Initialize
      state.apps = loadApps();
      attachEvents();
      renderLibrary();
      renderHomeShortcuts();
    })();
  </script>
</body>
</html>
