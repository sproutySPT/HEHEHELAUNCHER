<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="true" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#070816" />
  <title>Liquid Glass Launcher</title>
  <style>
    :root {
      --bg: #070816;
      --panel: rgba(12, 15, 30, 0.82);
      --line: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.98);
      --text-muted: rgba(255, 255, 255, 0.70);
      --text-muted2: rgba(255, 255, 255, 0.48);
      --shadow: 0 28px 100px rgba(0, 0, 0, 0.34);
      --shadow-sm: 0 8px 32px rgba(0, 0, 0, 0.20);
      --radius: 34px;
      --radius-lg: 28px;
      --radius-md: 18px;
      --blur-lg: blur(14px);
      --blur-md: blur(10px);
      --transition: 0.15s cubic-bezier(0.23, 1, 0.320, 1);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(99, 102, 241, 0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.22), transparent 24%),
        radial-gradient(circle at 50% 92%, rgba(236, 72, 153, 0.17), transparent 28%),
        var(--bg);
      background-attachment: fixed;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-touch-callout: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.26;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 54px 54px;
      z-index: 0;
    }

    button, input, textarea, select {
      font: inherit;
    }

    /* ===== Views ===== */
    .view {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .view.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== Home View ===== */
    .home {
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .home-content {
      max-width: 380px;
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.320, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-large {
      margin-bottom: 32px;
    }

    .brand-large small {
      display: block;
      font-size: 12px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--text-muted2);
      margin-bottom: 8px;
    }

    .brand-large h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.1;
      font-weight: 900;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(200, 200, 255, 0.80));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-desc {
      margin: 0 0 48px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .library-btn {
      position: relative;
      width: 100%;
      max-width: 300px;
      aspect-ratio: 1.4;
      border: none;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.4), rgba(139, 92, 246, 0.3), rgba(168, 85, 247, 0.2));
      border: 1px solid rgba(99, 102, 241, 0.6);
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text);
      transition: all var(--transition);
      overflow: hidden;
      touch-action: manipulation;
      margin: 0 auto;
    }

    .library-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.15), transparent 50%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .library-btn:hover {
      transform: translateY(-4px);
      border-color: rgba(99, 102, 241, 0.8);
      box-shadow: 0 28px 80px rgba(99, 102, 241, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .library-btn:hover::before {
      opacity: 1;
    }

    .library-btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    .library-btn-icon {
      position: relative;
      font-size: 48px;
      line-height: 1;
    }

    .library-btn-text {
      position: relative;
      font-size: 16px;
      font-weight: 750;
      letter-spacing: 0.02em;
    }

    .library-btn-sub {
      position: relative;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ===== Library View ===== */
    .library {
      flex-direction: column;
      padding: 0;
    }

    .library-header {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition);
      touch-action: manipulation;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .back-btn:active {
      transform: scale(0.95);
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
    }

    .library-search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 8px 12px;
      transition: background var(--transition), border-color var(--transition);
    }

    .library-search:focus-within {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.20);
    }

    .library-search svg {
      width: 16px;
      height: 16px;
      opacity: 0.68;
      flex-shrink: 0;
    }

    .library-search input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 13px;
    }

    .library-search input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .library-add {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.10);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition);
      touch-action: manipulation;
      flex-shrink: 0;
      font-weight: 700;
    }

    .library-add:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.20);
    }

    .library-add:active {
      transform: scale(0.95);
    }

    .library-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
    }

    .library-content::-webkit-scrollbar {
      width: 6px;
    }

    .library-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .library-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.20);
      border-radius: 3px;
    }

    .library-content::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.30);
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .app-card {
      position: relative;
      overflow: hidden;
      min-height: 160px;
      padding: 14px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08));
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      text-align: center;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      touch-action: manipulation;
    }

    .app-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.28);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
    }

    .app-card:active {
      transform: translateY(-1px) scale(0.98);
    }

    .app-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.45) 1px, transparent 0);
      background-size: 18px 18px;
      opacity: 0.28;
      pointer-events: none;
    }

    .app-card-icon {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .app-card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-card-name {
      position: relative;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }

    .app-card-desc {
      position: relative;
      font-size: 11px;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.60);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .app-card-menu {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .app-card:hover .app-card-menu {
      opacity: 1;
    }

    .app-card-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(11, 13, 25, 0.80);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      touch-action: manipulation;
    }

    .app-card-btn:hover {
      background: rgba(11, 13, 25, 0.95);
      border-color: rgba(255, 255, 255, 0.18);
      color: var(--text);
    }

    .app-card-btn:active {
      transform: scale(0.90);
    }

    .app-card-btn svg {
      width: 14px;
      height: 14px;
    }

    .app-card-btn.delete:hover {
      background: rgba(239, 68, 68, 0.20);
      border-color: rgba(239, 68, 68, 0.35);
      color: rgba(239, 68, 68, 0.90);
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      text-align: center;
      width: 100%;
    }

    .empty-state > div {
      max-width: 280px;
    }

    .empty-badge {
      width: 60px;
      height: 60px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }

    .empty-state h4 {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 850;
    }

    .empty-state p {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    /* ===== Runtime View ===== */
    .runtime {
      flex-direction: column;
      padding: 0;
      background: var(--bg);
    }

    .runtime-close {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1100;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(11, 13, 25, 0.90);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition);
      touch-action: manipulation;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.40);
    }

    .runtime-close:hover {
      background: rgba(11, 13, 25, 0.98);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .runtime-close:active {
      transform: scale(0.92);
    }

    .runtime-close svg {
      width: 20px;
      height: 20px;
    }

    .runtime-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }

    /* ===== Modal ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.50);
      backdrop-filter: var(--blur-md);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 16px;
      -webkit-backdrop-filter: var(--blur-md);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      position: relative;
      background: rgba(11, 13, 25, 0.95);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      -webkit-backdrop-filter: var(--blur-lg);
      backdrop-filter: var(--blur-lg);
    }

    .modal::-webkit-scrollbar {
      width: 6px;
    }

    .modal::-webkit-scrollbar-track {
      background: transparent;
    }

    .modal::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.20);
      border-radius: 3px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 850;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      flex-shrink: 0;
      touch-action: manipulation;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.18);
      color: var(--text);
    }

    .close-btn svg {
      width: 18px;
      height: 18px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-group input[type="text"] {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-md);
      padding: 12px;
      color: var(--text);
      font-size: 14px;
      transition: background var(--transition), border-color var(--transition);
    }

    .form-group input[type="text"]:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.20);
    }

    .form-group input[type="file"] {
      display: none;
    }

    .file-input-label {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(255, 255, 255, 0.20);
      background: rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-md);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
      font-size: 13px;
      color: var(--text-muted);
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
    }

    .file-input-label:hover {
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.30);
    }

    .file-input-label.has-file {
      border-color: rgba(99, 102, 241, 0.40);
      background: rgba(99, 102, 241, 0.15);
    }

    .file-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.12);
      margin-top: 8px;
    }

    .file-preview-icon {
      font-size: 16px;
    }

    .file-preview-name {
      flex: 1;
      text-align: left;
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-preview-remove {
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
      flex-shrink: 0;
      touch-action: manipulation;
    }

    .file-preview-remove:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    .file-preview-remove svg {
      width: 12px;
      height: 12px;
    }

    .error-msg {
      margin-top: 12px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.20);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: var(--radius-md);
      color: rgba(239, 68, 68, 0.90);
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn {
      flex: 1;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.10);
      color: var(--text);
      border-radius: 999px;
      padding: 12px;
      font-size: 14px;
      font-weight: 750;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
      user-select: none;
      touch-action: manipulation;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.20);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    .btn.primary {
      background: #fff;
      color: #090b17;
      border-color: rgba(255, 255, 255, 0.26);
      font-weight: 850;
    }

    .btn.primary:hover {
      background: #f2f5ff;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .apps-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .brand-large h1 {
        font-size: 32px;
      }

      .modal {
        max-height: 95vh;
        border-radius: 28px;
      }
    }

    @media (max-width: 480px) {
      .home-content {
        max-width: 100%;
      }

      .brand-large h1 {
        font-size: 28px;
      }

      .brand-desc {
        font-size: 14px;
        margin-bottom: 32px;
      }

      .library-btn {
        max-width: 100%;
        aspect-ratio: auto;
        padding: 40px 20px;
      }

      .library-btn-icon {
        font-size: 40px;
      }

      .library-btn-text {
        font-size: 15px;
      }

      .apps-grid {
        grid-template-columns: 1fr;
      }

      .library-content {
        padding: 12px;
      }

      .library-header {
        padding: 12px;
      }

      .app-card {
        min-height: 140px;
      }

      .modal {
        padding: 20px;
        border-radius: 24px;
      }

      .runtime-close {
        width: 36px;
        height: 36px;
        top: 10px;
        left: 10px;
      }
    }

    @supports not (backdrop-filter: blur(1px)) {
      .modal-backdrop {
        background: rgba(0, 0, 0, 0.70);
      }

      .modal {
        background: rgba(11, 13, 25, 0.98);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <!-- Home View -->
    <audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
  </audio>
  <div id="homeView" class="view active">
    <div class="home">
      <div class="home-content">
        <div class="brand-large">
          <small>Launcher</small>
          <h1>VIBE<h1>
          <small>by SPROUTY<small>
        </div>
        <p class="brand-desc">앱을 모으고 원클릭으로 실행하세요</p>
        <button id="toLibraryBtn" class="library-btn" type="button">
          <div class="library-btn-icon">📚</div>
          <div class="library-btn-text">라이브러리</div>
          <div class="library-btn-sub">앱 찾기</div>
        </button>
      </div>
    </div>
  </div>

  <!-- Library View -->
  <div id="libraryView" class="view library">
    <div class="library-header">
      <button id="libraryBackBtn" class="back-btn" type="button" aria-label="돌아가기" title="돌아가기">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="library-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="librarySearchInput" type="text" placeholder="앱 검색..." />
      </div>
      <button id="libraryAddBtn" class="library-add" type="button" title="앱 추가">＋</button>
    </div>
    <div class="library-content">
      <div id="appsGrid" class="apps-grid"></div>
    </div>
  </div>

  <!-- Runtime View -->
  <div id="runtimeView" class="view runtime">
    <button id="runtimeCloseBtn" class="runtime-close" type="button" aria-label="닫기" title="닫기">
      <svg viewBox="0 0 24 24"><path d="M6 18l12-12M18 18L6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <iframe id="runtimeFrame" class="runtime-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock" title="App Runtime"></iframe>
  </div>

  <!-- Modal -->
  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" id="modal">
      <div class="modal-head">
        <h2 id="modalTitle">앱 추가하기</h2>
        <button id="closeModalBtn" class="close-btn" type="button" aria-label="닫기">
          <svg viewBox="0 0 24 24"><path d="M6 18l12-12M18 18L6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <form id="appForm" onsubmit="return false;">
        <div class="form-group">
          <label for="nameInput">앱 이름 *</label>
          <input id="nameInput" type="text" maxlength="50" required />
        </div>

        <div class="form-group">
          <label for="descInput">설명</label>
          <input id="descInput" type="text" maxlength="120" />
        </div>

        <div class="form-group">
          <label for="iconInput">아이콘 이미지 *</label>
          <label for="iconInput" class="file-input-label" id="iconInputLabel">
            <span>📷 이미지 선택 (JPG, PNG, 2MB 이하)</span>
          </label>
          <input id="iconInput" type="file" accept="image/*" required />
          <div id="iconPreview" class="file-preview" style="display: none;">
            <div class="file-preview-icon">🖼️</div>
            <div class="file-preview-name" id="iconPreviewName"></div>
            <button id="iconRemoveBtn" class="file-preview-remove" type="button" aria-label="제거">
              <svg viewBox="0 0 24 24"><path d="M6 18l12-12M18 18L6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="htmlInput">앱 HTML 파일 *</label>
          <label for="htmlInput" class="file-input-label" id="htmlInputLabel">
            <span>📄 HTML 파일 선택</span>
          </label>
          <input id="htmlInput" type="file" accept=".html,.htm" required />
          <div id="htmlPreview" class="file-preview" style="display: none;">
            <div class="file-preview-icon">📄</div>
            <div class="file-preview-name" id="htmlPreviewName"></div>
            <button id="htmlRemoveBtn" class="file-preview-remove" type="button" aria-label="제거">
              <svg viewBox="0 0 24 24"><path d="M6 18l12-12M18 18L6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>

        <div id="formError" class="error-msg"></div>

        <div class="form-actions">
          <button id="cancelBtn" class="btn" type="button">취소</button>
          <button id="saveBtn" class="btn primary" type="button">저장</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (() => {
      const CONFIG = {
        STORAGE_APPS: 'launcher:apps'
      };
const bgm = document.getElementById('bgm');

const playBGM = () => {
  if (!bgm) return;

  bgm.volume = 0.4;

  const tryPlay = () => {
    bgm.play().catch(() => {});
    document.removeEventListener('click', tryPlay);
    document.removeEventListener('touchstart', tryPlay);
  };

  bgm.play().catch(() => {
    document.addEventListener('click', tryPlay, { once: true });
    document.addEventListener('touchstart', tryPlay, { once: true });
  });
};

playBGM();
      // State
      const state = {
        apps: [],
        currentView: 'home',
        searchQuery: '',
        formData: {
          id: null,
          name: '',
          description: '',
          iconImage: '',
          htmlContent: ''
        }
      };

      // DOM Elements Cache
      const els = {
        // Views
        homeView: document.getElementById('homeView'),
        libraryView: document.getElementById('libraryView'),
        runtimeView: document.getElementById('runtimeView'),

        // Navigation
        toLibraryBtn: document.getElementById('toLibraryBtn'),
        libraryBackBtn: document.getElementById('libraryBackBtn'),
        libraryAddBtn: document.getElementById('libraryAddBtn'),
        runtimeCloseBtn: document.getElementById('runtimeCloseBtn'),

        // Library
        appsGrid: document.getElementById('appsGrid'),
        librarySearchInput: document.getElementById('librarySearchInput'),

        // Modal
        modalBackdrop: document.getElementById('modalBackdrop'),
        modal: document.getElementById('modal'),
        modalTitle: document.getElementById('modalTitle'),
        appForm: document.getElementById('appForm'),
        nameInput: document.getElementById('nameInput'),
        descInput: document.getElementById('descInput'),
        iconInput: document.getElementById('iconInput'),
        iconInputLabel: document.getElementById('iconInputLabel'),
        iconPreview: document.getElementById('iconPreview'),
        iconPreviewName: document.getElementById('iconPreviewName'),
        iconRemoveBtn: document.getElementById('iconRemoveBtn'),
        htmlInput: document.getElementById('htmlInput'),
        htmlInputLabel: document.getElementById('htmlInputLabel'),
        htmlPreview: document.getElementById('htmlPreview'),
        htmlPreviewName: document.getElementById('htmlPreviewName'),
        htmlRemoveBtn: document.getElementById('htmlRemoveBtn'),
        formError: document.getElementById('formError'),
        cancelBtn: document.getElementById('cancelBtn'),
        saveBtn: document.getElementById('saveBtn'),
        closeModalBtn: document.getElementById('closeModalBtn'),

        // Runtime
        runtimeFrame: document.getElementById('runtimeFrame')
      };

      // Utility Functions
      const escapeHtml = (str) => {
        const div = document.createElement('div');
        div.textContent = String(str || '');
        return div.innerHTML;
      };

      const generateId = () => {
        return 'app_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      };

      const loadJSON = (key, fallback) => {
        try {
          if (!window.localStorage) return fallback;
          const data = window.localStorage.getItem(key);
          return data ? JSON.parse(data) : fallback;
        } catch {
          return fallback;
        }
      };

      const saveJSON = (key, data) => {
        try {
          if (!window.localStorage) return false;
          window.localStorage.setItem(key, JSON.stringify(data));
          return true;
        } catch {
          return false;
        }
      };

      const isHtmlDataUrl = (value) => typeof value === 'string' && value.startsWith('data:text/html');

      const decodeHtmlDataUrl = (value) => {
        if (!isHtmlDataUrl(value)) return value;
        const comma = value.indexOf(',');
        if (comma < 0) return value;
        const meta = value.slice(0, comma);
        const payload = value.slice(comma + 1);
        try {
          return meta.includes(';base64') ? atob(payload) : decodeURIComponent(payload);
        } catch {
          return value;
        }
      };

      const scoreText = (text) => {
        const replacements = (text.match(/\uFFFD/g) || []).length;
        const weirdLatin = (text.match(/[ÂÃâäåæçéêëìíîïðñòóôõöøùúûüýÿ]/g) || []).length;
        const hangul = (text.match(/[가-힣]/g) || []).length;
        return replacements * 50 + weirdLatin * 3 - hangul * 2;
      };

      const decodeBytesToText = (buffer) => {
        const bytes = new Uint8Array(buffer);
        const encodings = ['utf-8', 'utf-16le', 'utf-16be', 'euc-kr', 'windows-949', 'cp949', 'iso-8859-1'];
        let best = '';
        let bestScore = Number.POSITIVE_INFINITY;
        for (const encoding of encodings) {
          try {
            const decoded = new TextDecoder(encoding, { fatal: false }).decode(bytes);
            const score = scoreText(decoded);
            if (!best || score < bestScore) {
              best = decoded;
              bestScore = score;
            }
          } catch {}
        }
        return best || '';
      };

      const normalizeHtmlText = (value) => {
        let text = String(value || '');
        text = decodeHtmlDataUrl(text);
        text = text.replace(/^\uFEFF/, '');
        return text;
      };

      const setError = (msg) => {
        if (msg) {
          els.formError.textContent = msg;
          els.formError.classList.add('show');
        } else {
          els.formError.classList.remove('show');
          els.formError.textContent = '';
        }
      };

      const buildSrcDoc = (htmlContent) => {
        return `<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: rgba(255,255,255,0.98);
      background: #070816;
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
    }
    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.20); border-radius: 3px; }
    body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.30); }
  </style>
</head>
<body>
${htmlContent}
</body>
</html>`;
      };

      // View Management
      const showView = (viewName) => {
        state.currentView = viewName;
        els.homeView.classList.remove('active');
        els.libraryView.classList.remove('active');
        els.runtimeView.classList.remove('active');

        if (viewName === 'home') {
          els.homeView.classList.add('active');
        } else if (viewName === 'library') {
          els.libraryView.classList.add('active');
        } else if (viewName === 'runtime') {
          els.runtimeView.classList.add('active');
        }
      };

      // Storage Functions
      const loadApps = () => {
        const apps = loadJSON(CONFIG.STORAGE_APPS, []);
        if (!Array.isArray(apps)) return [];
        return apps
          .filter(app => app && typeof app === 'object')
          .map(app => ({
            ...app,
            htmlContent: normalizeHtmlText(app.htmlContent || '')
          }));
      };

      const saveApps = () => {
        return saveJSON(CONFIG.STORAGE_APPS, state.apps);
      };

      // App Functions
      const openAddModal = () => {
        state.formData = {
          id: null,
          name: '',
          description: '',
          iconImage: '',
          htmlContent: ''
        };
        els.modalTitle.textContent = '앱 추가하기';
        els.nameInput.value = '';
        els.descInput.value = '';
        els.iconInput.value = '';
        els.htmlInput.value = '';
        els.iconPreview.style.display = 'none';
        els.htmlPreview.style.display = 'none';
        els.iconInputLabel.textContent = '📷 이미지 선택 (JPG, PNG, 2MB 이하)';
        els.htmlInputLabel.textContent = '📄 HTML 파일 선택';
        setError('');
        els.modalBackdrop.classList.add('open');
        setTimeout(() => els.nameInput.focus(), 100);
      };

      const openEditModal = (appId) => {
        const app = state.apps.find(a => a.id === appId);
        if (!app) return;

        state.formData = {
          id: app.id,
          name: app.name,
          description: app.description || '',
          iconImage: app.iconImage || '',
          htmlContent: app.htmlContent || ''
        };

        els.modalTitle.textContent = '앱 수정하기';
        els.nameInput.value = state.formData.name;
        els.descInput.value = state.formData.description;
        els.iconInput.value = '';
        els.htmlInput.value = '';
        setError('');

        // Show preview for existing data
        if (state.formData.iconImage) {
          els.iconPreview.style.display = 'flex';
          els.iconPreviewName.textContent = 'Custom Icon';
        } else {
          els.iconPreview.style.display = 'none';
        }

        if (state.formData.htmlContent) {
          els.htmlPreview.style.display = 'flex';
          els.htmlPreviewName.textContent = 'HTML File';
        } else {
          els.htmlPreview.style.display = 'none';
        }

        els.iconInputLabel.textContent = '📷 이미지 변경 (선택)';
        els.htmlInputLabel.textContent = '📄 HTML 변경 (선택)';
        els.modalBackdrop.classList.add('open');
        setTimeout(() => els.nameInput.focus(), 100);
      };

      const hideModal = () => {
        els.modalBackdrop.classList.remove('open');
        state.formData = {
          id: null,
          name: '',
          description: '',
          iconImage: '',
          htmlContent: ''
        };
      };

      const saveApp = () => {
        const name = els.nameInput.value.trim();
        if (!name) {
          setError('앱 이름을 입력해줘.');
          return;
        }

        if (name.length > 50) {
          setError('앱 이름은 50자 이하여야 해.');
          return;
        }

        // Check for duplicate names
        const duplicate = state.apps.find(app =>
          app.name.toLowerCase() === name.toLowerCase() && app.id !== state.formData.id
        );
        if (duplicate) {
          setError(`"${escapeHtml(name)}"라는 앱이 이미 있어.`);
          return;
        }

        // Check required fields based on mode
        const iconFile = els.iconInput.files?.[0];
        const htmlFile = els.htmlInput.files?.[0];

        if (state.formData.id) {
          // Edit mode: files are optional
          if (iconFile) {
            if (!iconFile.type.startsWith('image/')) {
              setError('이미지 파일만 업로드할 수 있어.');
              return;
            }
            if (iconFile.size > 2 * 1024 * 1024) {
              setError('이미지는 2MB 이하여야 해.');
              return;
            }
            readFileAsDataURL(iconFile).then(data => {
              state.formData.iconImage = data;
              checkAndSave(name);
            }).catch(() => {
              setError('이미지를 읽는 중 오류가 발생했어.');
            });
            return;
          }
          if (htmlFile) {
            if (!htmlFile.name.endsWith('.html') && !htmlFile.name.endsWith('.htm')) {
              setError('HTML 파일만 업로드할 수 있어.');
              return;
            }
            if (htmlFile.size > 5 * 1024 * 1024) {
              setError('HTML 파일은 5MB 이하여야 해.');
              return;
            }
            readFileAsText(htmlFile).then(data => {
              state.formData.htmlContent = normalizeHtmlText(data);
              checkAndSave(name);
            }).catch(() => {
              setError('HTML 파일을 읽는 중 오류가 발생했어.');
            });
            return;
          }
          checkAndSave(name);
        } else {
          // Add mode: both are required
          if (!iconFile) {
            setError('아이콘 이미지를 선택해줘.');
            return;
          }
          if (!htmlFile) {
            setError('HTML 파일을 선택해줘.');
            return;
          }

          if (!iconFile.type.startsWith('image/')) {
            setError('이미지 파일만 업로드할 수 있어.');
            return;
          }
          if (iconFile.size > 2 * 1024 * 1024) {
            setError('이미지는 2MB 이하여야 해.');
            return;
          }

          if (!htmlFile.name.endsWith('.html') && !htmlFile.name.endsWith('.htm')) {
            setError('HTML 파일만 업로드할 수 있어.');
            return;
          }
          if (htmlFile.size > 5 * 1024 * 1024) {
            setError('HTML 파일은 5MB 이하여야 해.');
            return;
          }

          // Process both files
          Promise.all([
            readFileAsDataURL(iconFile),
            readFileAsText(htmlFile)
          ]).then(([iconData, htmlData]) => {
            state.formData.iconImage = iconData;
            state.formData.htmlContent = normalizeHtmlText(htmlData);
            checkAndSave(name);
          }).catch(() => {
            setError('파일을 읽는 중 오류가 발생했어. 다시 시도해봐.');
          });
        }
      };

      const checkAndSave = (name) => {
        const app = {
          id: state.formData.id || generateId(),
          name: name,
          description: els.descInput.value.trim(),
          iconImage: state.formData.iconImage,
          htmlContent: normalizeHtmlText(state.formData.htmlContent || ''),
          timestamp: Date.now()
        };

        if (state.formData.id) {
          // Edit
          const idx = state.apps.findIndex(a => a.id === state.formData.id);
          if (idx >= 0) {
            state.apps[idx] = { ...state.apps[idx], ...app };
          }
        } else {
          // Add
          state.apps.push(app);
        }

        if (!saveApps()) {
          setError('저장에 실패했어. 다시 시도해봐.');
          return;
        }

        hideModal();
        renderLibrary();
      };

      const deleteApp = (appId) => {
        const app = state.apps.find(a => a.id === appId);
        if (!app) return;

        if (!confirm(`"${escapeHtml(app.name)}"를 정말 삭제할까?`)) return;

        state.apps = state.apps.filter(a => a.id !== appId);
        saveApps();
        renderLibrary();
      };

      const launchApp = (appId) => {
        const app = state.apps.find(a => a.id === appId);
        if (!app || !app.htmlContent) return;

        try {
          els.runtimeFrame.srcdoc = normalizeHtmlText(app.htmlContent);
          showView('runtime');
        } catch (err) {
          console.error('Launch error:', err);
          alert('앱 실행 중 오류가 발생했어.');
        }
      };

      const readFileAsDataURL = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ''));
          reader.onerror = () => reject(new Error('File read error'));
          reader.readAsDataURL(file);
        });
      };

      const readFileAsText = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const result = reader.result;
              if (result instanceof ArrayBuffer) {
                resolve(normalizeHtmlText(decodeBytesToText(result)));
              } else {
                resolve(normalizeHtmlText(String(result || '')));
              }
            } catch (err) {
              reject(err);
            }
          };
          reader.onerror = () => reject(new Error('File read error'));
          reader.readAsArrayBuffer(file);
        });
      };

      // Render Functions
      const renderLibrary = () => {
        const query = state.searchQuery.trim().toLowerCase();
        const filtered = query
          ? state.apps.filter(app =>
              (app.name + ' ' + (app.description || '')).toLowerCase().includes(query)
            )
          : state.apps;

        if (!filtered.length) {
          els.appsGrid.innerHTML = `
            <div style="grid-column: 1 / -1;">
              <div class="empty-state">
                <div>
                  <div class="empty-badge">${state.apps.length ? '🔍' : '📦'}</div>
                  <h4>${state.apps.length ? '검색 결과가 없어요' : '아직 앱이 없어요'}</h4>
                  <p>${state.apps.length ? '검색어를 바꿔봐.' : '오른쪽 위 ＋ 버튼으로 첫 앱을 만들어봐.'}</p>
                </div>
              </div>
            </div>
          `;
          return;
        }

        els.appsGrid.innerHTML = filtered.map(app => `
          <article class="app-card" data-id="${app.id}">
            <div class="app-card-menu">
              <button class="app-card-btn" type="button" data-edit="${app.id}" title="수정">
                <svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16z" fill="currentColor"/><path d="M13 6l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
              <button class="app-card-btn delete" type="button" data-delete="${app.id}" title="삭제">
                <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14M10 10v6M14 10v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
            </div>
            <div class="app-card-icon">
              ${app.iconImage ? `<img src="${app.iconImage}" alt="" />` : '📦'}
            </div>
            <div class="app-card-name">${escapeHtml(app.name)}</div>
            <div class="app-card-desc">${escapeHtml(app.description || '설명 없음')}</div>
          </article>
        `).join('');

        // Event delegation
        els.appsGrid.querySelectorAll('[data-id]').forEach(card => {
          card.addEventListener('click', (e) => {
            if (e.target.closest('[data-edit]') || e.target.closest('[data-delete]')) return;
            launchApp(card.getAttribute('data-id'));
          });
        });

        els.appsGrid.querySelectorAll('[data-edit]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            openEditModal(btn.getAttribute('data-edit'));
          });
        });

        els.appsGrid.querySelectorAll('[data-delete]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteApp(btn.getAttribute('data-delete'));
          });
        });
      };

      // Event Listeners
      const attachEvents = () => {
        // Navigation
        els.toLibraryBtn.addEventListener('click', () => showView('library'));
        els.libraryBackBtn.addEventListener('click', () => showView('home'));
        els.runtimeCloseBtn.addEventListener('click', () => showView('library'));

        // Library
        els.libraryAddBtn.addEventListener('click', openAddModal);
        els.librarySearchInput.addEventListener('input', (e) => {
          state.searchQuery = e.target.value || '';
          renderLibrary();
        });

        // Modal
        els.closeModalBtn.addEventListener('click', hideModal);
        els.cancelBtn.addEventListener('click', hideModal);
        els.saveBtn.addEventListener('click', saveApp);

        els.modalBackdrop.addEventListener('click', (e) => {
          if (e.target === els.modalBackdrop) hideModal();
        });

        els.nameInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            els.descInput.focus();
          }
        });

        // Icon file input
        els.iconInput.addEventListener('change', () => {
          const file = els.iconInput.files?.[0];
          if (!file) return;

          if (!file.type.startsWith('image/')) {
            setError('이미지 파일만 업로드할 수 있어.');
            els.iconInput.value = '';
            return;
          }

          if (file.size > 2 * 1024 * 1024) {
            setError('이미지는 2MB 이하여야 해.');
            els.iconInput.value = '';
            return;
          }

          readFileAsDataURL(file).then(data => {
            state.formData.iconImage = data;
            els.iconPreview.style.display = 'flex';
            els.iconPreviewName.textContent = file.name;
            setError('');
          }).catch(() => {
            setError('이미지를 읽는 중 오류가 발생했어.');
            els.iconInput.value = '';
          });
        });

        els.iconRemoveBtn.addEventListener('click', (e) => {
          e.preventDefault();
          state.formData.iconImage = '';
          els.iconInput.value = '';
          els.iconPreview.style.display = 'none';
        });

        // HTML file input
        els.htmlInput.addEventListener('change', () => {
          const file = els.htmlInput.files?.[0];
          if (!file) return;

          if (!file.name.endsWith('.html') && !file.name.endsWith('.htm')) {
            setError('HTML 파일만 업로드할 수 있어.');
            els.htmlInput.value = '';
            return;
          }

          if (file.size > 5 * 1024 * 1024) {
            setError('HTML 파일은 5MB 이하여야 해.');
            els.htmlInput.value = '';
            return;
          }

          readFileAsDataURL(file).then(data => {
            state.formData.htmlContent = normalizeHtmlText(data);
            els.htmlPreview.style.display = 'flex';
            els.htmlPreviewName.textContent = file.name;
            setError('');
          }).catch(() => {
            setError('HTML 파일을 읽는 중 오류가 발생했어.');
            els.htmlInput.value = '';
          });
        });

        els.htmlRemoveBtn.addEventListener('click', (e) => {
          e.preventDefault();
          state.formData.htmlContent = '';
          els.htmlInput.value = '';
          els.htmlPreview.style.display = 'none';
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            if (els.modalBackdrop.classList.contains('open')) {
              hideModal();
            } else if (state.currentView === 'runtime') {
              showView('library');
            } else if (state.currentView === 'library') {
              showView('home');
            }
          }
        });
      };

      // Initialize
      state.apps = loadApps();
      attachEvents();
      renderLibrary();
    })();
  </script>
</body>
</html>
