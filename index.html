<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="true" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#070816" />
  <title>Liquid Glass Launcher</title>
  <style>
    :root {
      --bg: #070816;
      --panel: rgba(12, 15, 30, 0.82);
      --line: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.98);
      --text-muted: rgba(255, 255, 255, 0.70);
      --text-muted2: rgba(255, 255, 255, 0.48);
      --shadow: 0 28px 100px rgba(0, 0, 0, 0.34);
      --shadow-sm: 0 8px 32px rgba(0, 0, 0, 0.20);
      --radius: 34px;
      --radius-lg: 28px;
      --radius-md: 18px;
      --blur-lg: blur(14px);
      --blur-md: blur(10px);
      --transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(99, 102, 241, 0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.22), transparent 24%),
        radial-gradient(circle at 50% 92%, rgba(236, 72, 153, 0.17), transparent 28%),
        var(--bg);
      background-attachment: fixed;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-touch-callout: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.26;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 54px 54px;
      z-index: 0;
    }

    button, input, textarea, select {
      font: inherit;
    }

    /* ===== Views ===== */
    .view {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .view.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== Home View ===== */
    .home {
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .home-content {
      max-width: 380px;
      text-align: center;
      animation: slideUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-large {
      margin-bottom: 32px;
    }

    .brand-large small {
      display: block;
      font-size: 12px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--text-muted2);
      margin-bottom: 8px;
    }

    .brand-large h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.1;
      font-weight: 900;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(200, 200, 255, 0.80));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-desc {
      margin: 0 0 48px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .library-btn {
      position: relative;
      width: 100%;
      max-width: 300px;
      aspect-ratio: 1.4;
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text);
      transition: all var(--transition);
      overflow: hidden;
      touch-action: manipulation;
      margin: 0 auto;
    }

    .library-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(88, 44, 131, 0.15),
        rgba(108, 40, 168, 0.4),
        rgba(126, 34, 206, 0.4),
        rgba(108, 40, 168, 0.4),
        rgba(88, 44, 131, 0.15)
      );
      background-size: 200% 100%;
      animation: wavyGradient 3s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes wavyGradient {
      0% {
        background-position: 0% 0%;
      }
      50% {
        background-position: 100% 0%;
      }
      100% {
        background-position: 0% 0%;
      }
    }

    .library-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(88, 44, 131, 0.4), rgba(108, 40, 168, 0.3), rgba(126, 34, 206, 0.2));
      border: 1px solid rgba(126, 34, 206, 0.5);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 60px rgba(88, 44, 131, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      z-index: 1;
      pointer-events: none;
      backdrop-filter: var(--blur-md);
    }

    .library-btn-icon,
    .library-btn-text,
    .library-btn-sub {
      position: relative;
      z-index: 2;
    }

    .library-btn:hover {
      transform: translateY(-4px);
      border-color: rgba(126, 34, 206, 0.8);
      box-shadow: 0 28px 80px rgba(88, 44, 131, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .library-btn:hover::before {
      box-shadow: 0 28px 80px rgba(88, 44, 131, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .library-btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    .library-btn-icon {
      position: relative;
      font-size: 48px;
      line-height: 1;
    }

    .library-btn-text {
      position: relative;
      font-size: 16px;
      font-weight: 750;
      letter-spacing: 0.02em;
    }

    .library-btn-sub {
      position: relative;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .home-shortcuts {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      text-align: left;
    }

    .shortcut-column {
      padding: 10px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04));
      backdrop-filter: var(--blur-md);
      box-shadow: var(--shadow-sm);
    }

    .shortcut-title {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .shortcut-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .quick-app-btn {
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: var(--text);
      border-radius: 16px;
      padding: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 10px;
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
      touch-action: manipulation;
    }

    .quick-app-btn.recent {
      background: linear-gradient(135deg, rgba(236, 72, 153, 0.35), rgba(244, 114, 182, 0.25));
      border-color: rgba(236, 72, 153, 0.5);
      backdrop-filter: var(--blur-md);
      box-shadow: 0 12px 32px rgba(236, 72, 153, 0.18);
    }

    .quick-app-btn.favorite {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.35), rgba(56, 189, 248, 0.25));
      border-color: rgba(34, 211, 238, 0.5);
      backdrop-filter: var(--blur-md);
      box-shadow: 0 12px 32px rgba(34, 211, 238, 0.18);
    }

    .quick-app-btn:hover {
      transform: translateY(-2px);
    }

    .quick-app-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .quick-app-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 20px;
      line-height: 1;
    }

    .quick-app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .quick-app-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .quick-app-name {
      font-size: 13px;
      font-weight: 650;
      color: var(--text);
      word-break: break-word;
      line-height: 1.2;
    }

    .quick-app-desc {
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-word;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .shortcut-empty {
      margin: 12px 0 0;
      padding: 0;
      font-size: 12px;
      color: var(--text-muted2);
      text-align: center;
    }

    /* ===== Library View ===== */
    .library {
      flex: 1;
      padding-bottom: 16px;
    }

    .library-header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 16px 16px 12px;
      background:
        radial-gradient(circle at 18% 20%, rgba(99, 102, 241, 0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.22), transparent 24%),
        radial-gradient(circle at 50% 92%, rgba(236, 72, 153, 0.17), transparent 28%),
        var(--bg);
      background-attachment: fixed;
    }

    .library-header::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line) 20%, var(--line) 80%, transparent);
    }

    .lib-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .lib-back-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lib-title h2 {
      margin: 0;
      flex: 1;
      font-size: 24px;
      font-weight: 900;
      text-align: center;
    }

    .lib-add-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition);
    }

    .lib-add-btn:hover {
      transform: scale(1.08);
    }

    .lib-add-btn:active {
      transform: scale(0.96);
    }

    .lib-search {
      position: relative;
    }

    .lib-search input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 14px;
      backdrop-filter: var(--blur-md);
      transition: border-color var(--transition), background var(--transition);
    }

    .lib-search input::placeholder {
      color: var(--text-muted2);
    }

    .lib-search input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.12);
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 12px 16px;
      overflow-y: auto;
      flex: 1;
    }

    @media (min-width: 480px) {
      .apps-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      }
    }

    .app-card {
      position: relative;
      border-radius: 20px;
      padding: 12px;
      border: 1px solid rgba(168, 85, 247, 0.4);
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.25), rgba(139, 92, 246, 0.18), rgba(99, 102, 241, 0.12));
      backdrop-filter: var(--blur-md);
      box-shadow: 
        0 20px 50px rgba(168, 85, 247, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
      cursor: grab;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      transition: all var(--transition);
      touch-action: manipulation;
      overflow: hidden;
      user-select: none;
    }

    .app-card:active {
      cursor: grabbing;
    }

    .app-card.dragging {
      opacity: 0.5;
      transform: scale(0.95);
      border-color: rgba(168, 85, 247, 0.8);
      box-shadow: 
        0 28px 70px rgba(168, 85, 247, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .app-card.drag-over {
      border-color: rgba(168, 85, 247, 0.8);
      border-style: dashed;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.35), rgba(139, 92, 246, 0.25), rgba(99, 102, 241, 0.18));
    }

    .app-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.1), transparent 40%);
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }

    .app-card:hover {
      transform: translateY(-3px);
      border-color: rgba(168, 85, 247, 0.6);
      box-shadow: 
        0 28px 70px rgba(168, 85, 247, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .app-card:hover::before {
      opacity: 1;
    }

    .app-card:active {
      transform: translateY(-1px) scale(0.98);
    }

    .app-card-menu {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 5;
    }

    .app-card:hover .app-card-menu {
      opacity: 1;
    }

    .app-card-btn {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      width: 28px;
      height: 28px;
      padding: 4px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .app-card-btn svg {
      width: 14px;
      height: 14px;
    }

    .app-card-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
    }

    .app-card-btn.delete:hover {
      background: rgba(239, 68, 68, 0.3);
      border-color: rgba(239, 68, 68, 0.5);
      color: rgba(239, 68, 68, 1);
    }

    .app-card-btn.favorite.active {
      background: rgba(251, 146, 60, 0.3);
      border-color: rgba(251, 146, 60, 0.5);
      color: rgba(251, 146, 60, 1);
    }

    .app-card-icon {
      position: relative;
      z-index: 2;
      width: 80px;
      height: 80px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      line-height: 1;
      flex-shrink: 0;
      overflow: hidden;
    }

    .app-card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-card-content {
      position: relative;
      z-index: 2;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: center;
    }

    .app-card-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      word-break: break-word;
      line-height: 1.2;
    }

    .app-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-word;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .app-card-date {
      font-size: 11px;
      color: var(--text-muted2);
      line-height: 1.2;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
    }

    .empty-badge {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .empty-state h4 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .empty-state p {
      margin: 0;
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ===== Modal ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      background: rgba(0, 0, 0, 0);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 16px;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.48);
    }

    .modal-panel {
      position: relative;
      background:
        radial-gradient(circle at 18% 20%, rgba(99, 102, 241, 0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.22), transparent 24%),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur-lg);
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin: 0 auto;
    }

    .modal-header {
      position: relative;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      flex: 1;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .form-input {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 14px;
      transition: border-color var(--transition), background var(--transition);
    }

    .form-input::placeholder {
      color: var(--text-muted2);
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(168, 85, 247, 0.6);
      background: rgba(255, 255, 255, 0.12);
    }

    textarea.form-input {
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .icon-preview {
      display: none;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
      margin-top: 8px;
    }

    .icon-preview.show {
      display: flex;
    }

    .icon-preview-img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .icon-preview-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .icon-preview-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .file-input-wrapper {
      position: relative;
      display: block;
      border-radius: var(--radius-md);
    }

    .file-input-label {
      display: block;
      padding: 16px 14px;
      border: 2px dashed rgba(126, 34, 206, 0.4);
      border-radius: var(--radius-md);
      background: rgba(126, 34, 206, 0.08);
      color: var(--text-muted);
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
    }

    .file-input-label:hover {
      border-color: rgba(126, 34, 206, 0.6);
      background: rgba(126, 34, 206, 0.14);
      color: var(--text);
    }

    .file-input-wrapper input[type="file"] {
      display: none;
    }

    .error-msg {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: rgba(255, 200, 200, 1);
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .modal-footer {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      touch-action: manipulation;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(139, 92, 246, 0.7));
      color: var(--text);
      border: 1px solid rgba(168, 85, 247, 0.6);
      box-shadow: 0 12px 32px rgba(168, 85, 247, 0.2);
      flex: 1;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 48px rgba(168, 85, 247, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .btn-secondary:active {
      transform: scale(0.98);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-inline {
      background: none;
      border: none;
      color: var(--text-muted);
      text-decoration: underline;
      padding: 0;
      font-size: 12px;
    }

    .btn-inline:hover {
      color: var(--text);
    }

    /* ===== Runtime View ===== */
    .runtime {
      flex-direction: column;
    }

    .runtime-header {
      position: relative;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .runtime-title {
      margin: 0;
      flex: 1;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }

    .runtime-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .runtime-content {
      flex: 1;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="view home active">
    <div class="home-content">
      <div class="brand-large">
        <small>Welcome</small>
        <h1>Liquid Glass Launcher</h1>
      </div>
      <p class="brand-desc">당신의 앱을 한 곳에서 관리하세요</p>
      <button class="library-btn" onclick="switchView('library')">
        <div class="library-btn-icon">📚</div>
        <div class="library-btn-text">라이브러리</div>
        <div class="library-btn-sub">앱 관리</div>
      </button>

      <div class="home-shortcuts">
        <div class="shortcut-column">
          <p class="shortcut-title">최근 앱</p>
          <div class="shortcut-list" id="recent-shortcuts"></div>
          <p class="shortcut-empty" id="recent-empty">없음</p>
        </div>
        <div class="shortcut-column">
          <p class="shortcut-title">즐겨찾기</p>
          <div class="shortcut-list" id="favorite-shortcuts"></div>
          <p class="shortcut-empty" id="favorite-empty">없음</p>
        </div>
      </div>
    </div>
  </div>

  <div class="view library">
    <div class="library-header">
      <div class="lib-title">
        <button class="lib-back-btn" onclick="switchView('home')">←</button>
        <h2>라이브러리</h2>
        <button class="lib-add-btn" onclick="openModal()">+</button>
      </div>
      <div class="lib-search">
        <input type="text" id="search-input" placeholder="앱 검색..." />
      </div>
    </div>
    <div class="apps-grid" id="apps-grid"></div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
    <div class="modal-panel" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>앱 추가</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-content">
        <div class="error-msg" id="error-msg"></div>
        <div class="form-group">
          <label class="form-label">앱 이름</label>
          <input type="text" class="form-input" id="app-name" placeholder="앱 이름을 입력하세요" />
        </div>
        <div class="form-group">
          <label class="form-label">설명</label>
          <textarea class="form-input" id="app-desc" placeholder="앱 설명을 입력하세요"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">아이콘 URL (선택)</label>
          <input type="text" class="form-input" id="app-icon" placeholder="이미지 URL 또는 이모지 입력" />
          <div class="icon-preview" id="icon-preview">
            <div class="icon-preview-img" id="icon-preview-img">
              <span id="icon-emoji">📱</span>
            </div>
            <span class="icon-preview-text" id="icon-preview-text">미리보기</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">URL/경로</label>
          <input type="text" class="form-input" id="app-url" placeholder="https://example.com 또는 경로" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">너비 (%)</label>
            <input type="number" class="form-input" id="app-width" placeholder="100" value="100" />
          </div>
          <div class="form-group">
            <label class="form-label">높이 (%)</label>
            <input type="number" class="form-input" id="app-height" placeholder="100" value="100" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="addApp()">추가</button>
      </div>
    </div>
  </div>

  <div class="view runtime" id="runtime-view">
    <div class="runtime-header">
      <button class="lib-back-btn" onclick="closeRuntime()" style="position: absolute; left: 16px;">←</button>
      <h3 class="runtime-title" id="runtime-title">앱</h3>
      <button class="runtime-close" onclick="closeRuntime()" style="position: absolute; right: 16px;">✕</button>
    </div>
    <div class="runtime-content" id="runtime-content"></div>
  </div>

  <script>
    let apps = JSON.parse(localStorage.getItem('apps')) || [];
    let recentApps = JSON.parse(localStorage.getItem('recentApps')) || [];
    let favoriteApps = JSON.parse(localStorage.getItem('favoriteApps')) || [];

    const MAX_RECENT = 3;
    const MAX_FAVORITES = 3;

    function saveApps() {
      localStorage.setItem('apps', JSON.stringify(apps));
    }

    function switchView(viewName) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelector(`.${viewName}`).classList.add('active');
      if (viewName === 'library') renderApps();
    }

    function renderApps(filter = '') {
      const grid = document.getElementById('apps-grid');
      grid.innerHTML = '';

      let filtered = apps;
      if (filter) {
        filtered = apps.filter(app => 
          app.name.toLowerCase().includes(filter.toLowerCase()) ||
          app.desc.toLowerCase().includes(filter.toLowerCase())
        );
      }

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <span class="empty-badge">📭</span>
            <h4>앱이 없습니다</h4>
            <p>+ 버튼을 클릭해 앱을 추가하세요</p>
          </div>
        `;
        return;
      }

      filtered.forEach(app => {
        const card = document.createElement('div');
        card.className = 'app-card';
        card.draggable = true;
        
        const isFavorite = favoriteApps.includes(app.id);
        const iconContent = app.icon.startsWith('http') ? 
          `<img src="${app.icon}" alt="${app.name}">` :
          app.icon;

        card.innerHTML = `
          <div class="app-card-menu">
            <button class="app-card-btn favorite ${isFavorite ? 'active' : ''}" onclick="toggleFavorite('${app.id}')">⭐</button>
            <button class="app-card-btn delete" onclick="deleteApp('${app.id}')">🗑️</button>
          </div>
          <div class="app-card-icon">${iconContent}</div>
          <div class="app-card-content">
            <div class="app-card-name">${app.name}</div>
            <div class="app-card-desc">${app.desc}</div>
            <div class="app-card-date">${new Date(app.date).toLocaleDateString('ko-KR')}</div>
          </div>
        `;

        card.addEventListener('click', () => launchApp(app));
        card.addEventListener('dragstart', (e) => {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('appId', app.id);
          card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          card.classList.add('drag-over');
        });
        card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          const draggedId = e.dataTransfer.getData('appId');
          reorderApps(draggedId, app.id);
          card.classList.remove('drag-over');
        });

        grid.appendChild(card);
      });
    }

    function launchApp(app) {
      // Add to recent
      recentApps = recentApps.filter(id => id !== app.id);
      recentApps.unshift(app.id);
      if (recentApps.length > MAX_RECENT) recentApps.pop();
      localStorage.setItem('recentApps', JSON.stringify(recentApps));

      // Open
      if (app.url.startsWith('http')) {
        const width = app.width || 100;
        const height = app.height || 100;
        document.getElementById('runtime-title').textContent = app.name;
        document.getElementById('runtime-content').innerHTML = `<iframe src="${app.url}" style="width:${width}%; height:${height}%;"></iframe>`;
        switchView('runtime');
      } else {
        alert('경로 실행 미지원: ' + app.url);
      }
    }

    function closeRuntime() {
      switchView('home');
      renderShortcuts();
    }

    function openModal() {
      document.getElementById('modal-backdrop').classList.add('open');
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('modal-backdrop')) return;
      document.getElementById('modal-backdrop').classList.remove('open');
    }

    function addApp() {
      const name = document.getElementById('app-name').value.trim();
      const desc = document.getElementById('app-desc').value.trim();
      const icon = document.getElementById('app-icon').value.trim() || '📱';
      const url = document.getElementById('app-url').value.trim();
      const width = document.getElementById('app-width').value || 100;
      const height = document.getElementById('app-height').value || 100;

      const errorMsg = document.getElementById('error-msg');
      errorMsg.classList.remove('show');

      if (!name || !url) {
        errorMsg.textContent = '앱 이름과 URL은 필수입니다';
        errorMsg.classList.add('show');
        return;
      }

      const app = {
        id: Date.now().toString(),
        name,
        desc,
        icon,
        url,
        width,
        height,
        date: new Date().toISOString()
      };

      apps.unshift(app);
      saveApps();
      closeModal();
      renderApps();

      document.getElementById('app-name').value = '';
      document.getElementById('app-desc').value = '';
      document.getElementById('app-icon').value = '';
      document.getElementById('app-url').value = '';
      document.getElementById('app-width').value = '100';
      document.getElementById('app-height').value = '100';
    }

    function deleteApp(id) {
      if (confirm('정말 삭제하시겠습니까?')) {
        apps = apps.filter(app => app.id !== id);
        saveApps();
        renderApps();
      }
    }

    function toggleFavorite(id) {
      if (favoriteApps.includes(id)) {
        favoriteApps = favoriteApps.filter(fav => fav !== id);
      } else {
        favoriteApps.unshift(id);
        if (favoriteApps.length > MAX_FAVORITES) favoriteApps.pop();
      }
      localStorage.setItem('favoriteApps', JSON.stringify(favoriteApps));
      renderApps();
      renderShortcuts();
    }

    function reorderApps(fromId, toId) {
      const fromIndex = apps.findIndex(a => a.id === fromId);
      const toIndex = apps.findIndex(a => a.id === toId);
      if (fromIndex >= 0 && toIndex >= 0) {
        [apps[fromIndex], apps[toIndex]] = [apps[toIndex], apps[fromIndex]];
        saveApps();
        renderApps();
      }
    }

    function renderShortcuts() {
      // Recent
      const recentList = document.getElementById('recent-shortcuts');
      const recentEmpty = document.getElementById('recent-empty');
      recentList.innerHTML = '';
      const recentAppsList = recentApps.map(id => apps.find(a => a.id === id)).filter(Boolean).slice(0, MAX_RECENT);
      
      if (recentAppsList.length) {
        recentEmpty.style.display = 'none';
        recentAppsList.forEach(app => {
          const iconContent = app.icon.startsWith('http') ? 
            `<img src="${app.icon}" alt="${app.name}">` :
            app.icon;
          const btn = document.createElement('button');
          btn.className = 'quick-app-btn recent';
          btn.innerHTML = `
            <div class="quick-app-icon">${iconContent}</div>
            <div class="quick-app-content">
              <div class="quick-app-name">${app.name}</div>
              <div class="quick-app-desc">${app.desc}</div>
            </div>
          `;
          btn.onclick = () => launchApp(app);
          recentList.appendChild(btn);
        });
      } else {
        recentEmpty.style.display = 'block';
      }

      // Favorites
      const favoriteList = document.getElementById('favorite-shortcuts');
      const favoriteEmpty = document.getElementById('favorite-empty');
      favoriteList.innerHTML = '';
      const favoriteAppsList = favoriteApps.map(id => apps.find(a => a.id === id)).filter(Boolean).slice(0, MAX_FAVORITES);
      
      if (favoriteAppsList.length) {
        favoriteEmpty.style.display = 'none';
        favoriteAppsList.forEach(app => {
          const iconContent = app.icon.startsWith('http') ? 
            `<img src="${app.icon}" alt="${app.name}">` :
            app.icon;
          const btn = document.createElement('button');
          btn.className = 'quick-app-btn favorite';
          btn.innerHTML = `
            <div class="quick-app-icon">${iconContent}</div>
            <div class="quick-app-content">
              <div class="quick-app-name">${app.name}</div>
              <div class="quick-app-desc">${app.desc}</div>
            </div>
          `;
          btn.onclick = () => launchApp(app);
          favoriteList.appendChild(btn);
        });
      } else {
        favoriteEmpty.style.display = 'block';
      }
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      renderApps(e.target.value);
    });

    document.getElementById('app-icon').addEventListener('input', (e) => {
      const preview = document.getElementById('icon-preview');
      const previewImg = document.getElementById('icon-preview-img');
      const value = e.target.value.trim();

      if (value) {
        preview.classList.add('show');
        if (value.startsWith('http')) {
          previewImg.innerHTML = `<img src="${value}" alt="icon">`;
        } else {
          previewImg.innerHTML = value;
        }
      } else {
        preview.classList.remove('show');
      }
    });

    renderApps();
    renderShortcuts();
  </script>
</body>
</html>
